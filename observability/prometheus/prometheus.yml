global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: control-api
    metrics_path: /metrics
    static_configs:
      - targets: ['control-api:3000']
        labels:
          service: control-api

  - job_name: decide-api
    metrics_path: /metrics
    static_configs:
      - targets: ['decide-api:3000']
        labels:
          service: decide-api

  - job_name: ingest-api
    metrics_path: /metrics
    static_configs:
      - targets: ['ingest-api:3000']
        labels:
          service: ingest-api

  - job_name: control-workers
    metrics_path: /metrics
    static_configs:
      - targets: ['control-workers:3000']
        labels:
          service: control-workers

  - job_name: ingest-workers
    metrics_path: /metrics
    static_configs:
      - targets: ['ingest-workers:3000']
        labels:
          service: ingest-workers
